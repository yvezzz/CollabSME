<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4;">
<div style="max-width: 600px; margin: auto; background: white; border-radius: 8px; padding: 30px;">
  <h2 style="color: #6366F1;">Réinitialisation de mot de passe</h2>
  <p>Bonjour {{ user.first_name }},</p>
  <p>Vous avez demandé la réinitialisation de votre mot de passe.</p>
  <p>Votre code de réinitialisation :</p>
  <div style="text-align: center; margin: 30px 0;">
    <span style="font-size: 24px; font-weight: bold; color: #6366F1; 
          background: #f0f0ff; padding: 10px 20px; border-radius: 4px;">
      {{ token }}
    </span>
  </div>
  <p style="color: #666;">Ce lien expire dans 24 heures.</p>
  <p>Si vous n'avez pas demandé cette réinitialisation, ignorez cet email.</p>
</div>
</body>
</html>
