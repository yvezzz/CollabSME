<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4;">
<div style="max-width: 600px; margin: auto; background: white; border-radius: 8px; padding: 30px;">
  <h2 style="color: #6366F1;">Invitation à rejoindre {{ company_name }}</h2>
  <p>Bonjour,</p>
  <p>{{ inviter_name }} vous invite à rejoindre <strong>{{ company_name }}</strong> sur Koda.</p>
  <p>Pour accepter l'invitation, cliquez sur le lien ci-dessous :</p>
  <div style="text-align: center; margin: 30px 0;">
    <a href="https://koda.app/invitations/accept/{{ token }}/"
       style="background: #6366F1; color: white; padding: 12px 24px;
              text-decoration: none; border-radius: 4px; font-weight: bold;">
      Accepter l'invitation
    </a>
  </div>
  <p style="color: #666;">Ce lien expire dans 7 jours.</p>
</div>
</body>
</html>
