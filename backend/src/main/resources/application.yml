server:
  port: 8000

spring:
  application:
    name: collabsme-backend
  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://localhost:3306/collabsme?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:}
  h2:
    console:
      enabled: false
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    default-property-inclusion: non_null

app:
  base-url: ${APP_BASE_URL:https://collabsme-7e261.web.app}
  jwt:
    secret: collabsme-jwt-secret-key-change-in-production-must-be-at-least-256-bits-long
    access-token-expiration: 86400000
    refresh-token-expiration: 1209600000
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:z-ai/glm-4.5-air:free}
    url: https://openrouter.ai/api/v1/chat/completions
  upload:
    dir: ${UPLOAD_DIR:./uploads}

logging:
  file:
    name: spring.log
  level:
    com.collabsme: DEBUG

springdoc:
  api-docs:
    path: /api/schema
  swagger-ui:
    path: /api/docs
