server:
  port: 8000

spring:
  application:
    name: collabsme-backend
  datasource:
    url: jdbc:h2:file:./data/collabsme;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
    default-property-inclusion: non_null

app:
  jwt:
    secret: collabsme-jwt-secret-key-change-in-production-must-be-at-least-256-bits-long
    access-token-expiration: 3600000
    refresh-token-expiration: 1209600000
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:z-ai/glm-4.5-air:free}
    url: https://openrouter.ai/api/v1/chat/completions
  upload:
    dir: ${UPLOAD_DIR:./uploads}

springdoc:
  api-docs:
    path: /api/schema
  swagger-ui:
    path: /api/docs
